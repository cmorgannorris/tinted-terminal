dim-red          = '#ff5555' # base08
dim-yellow       = '#f1fa8c' # base0A
dim-green        = '#50fa7b' # base0B
dim-cyan         = '#8be9fd' # base0C
dim-blue         = '#bd93f9' # base0D
dim-magenta      = '#ff79c6' # base0E
dim-white        = '#9ea8c7' # base04

light-foreground = '#f8f8f2' # base05
light-black      = '#44475a' # base02
light-red        = '#ff6e6e' # base12
light-yellow     = '#ffffa5' # base13
light-green      = '#69ff94' # base14
light-cyan       = '#a4ffff' # base15
light-blue       = '#d6acff' # base16
