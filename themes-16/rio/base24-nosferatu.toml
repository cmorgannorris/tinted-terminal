# Rio Terminal base24 color theme (https://github.com/tinted-theming)
# Color scheme: nosferatu by morgan

[colors]
selection-background = '#44475a' # base02
selection-foreground = '#f8f8f2' # base05

cursor         = '#f8f8f2' # base05
tabs           = '#363447' # base01
